stages:
  - build
  - deploy

variables:
  MAVEN_OPTS: "-Dhttps.protocols=TLSv1.2 -Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository -Djava.awt.headless=true"
  MAVEN_CLI_OPTS: "--batch-mode --errors --fail-at-end --show-version"
  # Целевые каталоги для копирования (рекомендую задать в Settings → CI/CD → Variables)
  COPY_PATH: "/oradev/bin"
  COPY_PATH2: "/oradev/japp.2"
  COPYSERVER: "/data/apache-tomcat-6.0.26/webapps/fxdoc"
  # Настройки SVN (замените на реальные или храните в Masked Variables)
  SVN_LOGIN: "jenkins"
  SVN_PASSWORD: "jk4987s"

cache:
  paths:
    - .m2/repository/

# Стадия сборки
build:
  stage: build
  image: maven:3.8.6-openjdk-8
  script:
    - mvn $MAVEN_CLI_OPTS clean package -DskipTests
  artifacts:
    paths:
      - target/*.jar
    expire_in: 1 hour
  only:
    - main

# Стадия деплоя (копирование на сетевой диск)
deploy:
  stage: deploy
  image: maven:3.8.6-openjdk-8
  before_script:
    # Копируем settings.xml, если он нужен для резолва зависимостей (даже для одиночного плагина)
    - |
      if [ ! -f "$HOME/.m2/settings.xml" ]; then
        if [ -f "$CI_PROJECT_DIR/settings.xml" ]; then
          mkdir -p "$HOME/.m2"
          cp "$CI_PROJECT_DIR/settings.xml" "$HOME/.m2/settings.xml"
        else
          echo "WARNING: settings.xml not found, proceeding without it."
        fi
      fi
    # Создаём локальный репозиторий (на всякий случай)
    - mkdir -p "$CI_PROJECT_DIR/.m2/repository"
  script:
    # Выполняем только копирование ресурсов, не пересобирая проект.
    # Параметры -Dru.inversion.copy и другие передаются плагину.
    - |
      mvn -B -U -e \
        -Dmaven.repo.local="$CI_PROJECT_DIR/.m2/repository" \
        -Dru.inversion.copy="$COPY_PATH" \
        -Dru.inversion.copy.2="$COPY_PATH2" \
        -Dru.inversion.copyserver="$COPYSERVER" \
        -DsvnLogin="$SVN_LOGIN" \
        -DsvnPassword="$SVN_PASSWORD" \
        -DskipTests \
        -s "$HOME/.m2/settings.xml" \
        -Pbuild \
        resources:copy-resources@copy-resources.2
  dependencies:
    - build
  only:
    - main
  when: manual   # Можно убрать, если хотите автоматический деплой